data:
  text_col: message
  label_col: label
  test_size: 0.2
  random_state: 42

preprocessing:
  min_token_length: 2
  languages:
    - english
    - french

tfidf:
  max_features: 10000
  ngram_range: [1, 2]

model:
  name: LogisticRegression
  class_weight: balanced
  max_iter: 1000
  random_state: 42
