name: CI Tests

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install pandas numpy scikit-learn nltk

      - name: Download NLTK
        run: python -c "import nltk; nltk.download('stopwords'); nltk.download('punkt'); nltk.download('wordnet')"

      - name: Run tests
        run: |
          python -c "
          import re
          from nltk.corpus import stopwords
          from nltk.stem import WordNetLemmatizer
          stop = set(stopwords.words('english'))
          lem = WordNetLemmatizer()
          text = 'Hello World http spam com'
          text = re.sub(r'[^\w\s]', ' ', text.lower())
          tokens = [lem.lemmatize(w) for w in text.split() if w not in stop and len(w) > 2]
          result = ' '.join(tokens)
          assert len(result) > 0
          print('OK preprocessing')
          from sklearn.feature_extraction.text import TfidfVectorizer
          v = TfidfVectorizer()
          X = v.fit_transform(['hello world', 'test tweet'])
          assert X.shape[0] == 2
          print('OK vectorization')
          print('ALL TESTS PASSED')
          "
